<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ejercicio 1</title>
    <link rel="stylesheet" href="./ejercicio1.css" />
  </head>
  <body>
    <h1>Nuestra Carta</h1>
    <label>
      <input type="checkbox" id="allergyMode" /> Activar Modo Alergias
    </label>
    <hr />

    <div class="menu-item">
      <img
        src="./img/tortilla-de-patatas.jpg"
        alt="Tortilla"
        data-allergens="Huevo"
      />
      <h3>Tortilla de Patatas</h3>
    </div>
    <div class="menu-item">
      <img
        src="./img/macarrones-con-queso.jpg"
        alt="Macarrones"
        data-allergens="Gluten, Lácteos"
      />
      <h3>Macarrones con Queso</h3>
    </div>

    <script src="./ejercicio1.js"></script>
  </body>
</html>
